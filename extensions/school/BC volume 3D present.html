<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumes with Known Cross Sections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        // 【防闪烁引擎】在 DOM 加载前立即锁定主题，防止“白闪黑”或“黑闪白”
        (function() {
            const saved = localStorage.getItem('bc_theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else {
                // 如果是第一次加载，默认保持黑暗模式（保护眼睛），直到握手成功
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    
<style>
    :root {
        --bg: #000000;
        --sidebar: #0C0C0E;
        --accent: #F59E0B;
        --border: #27272A;
        --input: #151518;
        --text: #F4F4F5;
        --muted: #71717A;
        --error: #EF4444;
        --plot-bg: #000000;
        --transition: 0.25s ease;
    }

    [data-theme="light"] {
        --bg: #FFFFFF;
        --sidebar: #F8F8FA;
        --border: #E4E4E7;
        --input: #FFFFFF;
        --text: #09090B;
        --muted: #71717A;
        --plot-bg: #FFFFFF;
        --accent: #B45309;
    }

    body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; padding: 0; 
        background: var(--bg); 
        color: var(--text);
        display: flex; height: 100vh; overflow: hidden;
        transition: background var(--transition);
    }

    #sidebar { 
        width: 440px; min-width: 440px;
        background: var(--sidebar); 
        padding: 32px; 
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column; gap: 24px;
        z-index: 20; overflow-y: auto;
    }

    #sidebar::-webkit-scrollbar { width: 5px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    #sidebar::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    header .title-area { flex: 1; }
    header h1 { font-size: 1.25rem; font-weight: 900; letter-spacing: 0.02em; color: var(--accent); margin: 0; text-transform: uppercase; line-height: 1.2; }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 6px; font-weight: 500; }

    #theme-toggle {
        background: var(--input); border: 1px solid var(--border); 
        padding: 6px 12px; border-radius: 6px; color: var(--text);
        font-size: 0.65rem; font-weight: 800; cursor: pointer;
        text-transform: uppercase; letter-spacing: 0.05em;
        transition: all var(--transition); white-space: nowrap;
    }
    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .group-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.95rem; color: var(--text); font-weight: 700; margin-bottom: 8px; }
    
    input[type="text"], input[type="number"], select { 
        width: 100%; background: var(--input); 
        border: 1px solid var(--border); 
        border-radius: 10px; padding: 14px;
        color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 1.1rem;
        box-sizing: border-box; outline: none; transition: all var(--transition);
    }
    input:focus { border-color: var(--accent); }
    input.invalid { border-color: var(--error); background: rgba(239, 68, 68, 0.05); }

    .math-preview { font-size: 1.1rem; color: var(--accent); margin-top: 10px; min-height: 1.5em; font-weight: 500; }

    .math-kb { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
    .kb-btn { 
        background: var(--input); color: var(--text); border: 1px solid var(--border); padding: 10px 4px; 
        border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; 
        cursor: pointer; transition: all 0.2s;
    }
    .kb-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .action-btn { 
        background: var(--text); color: var(--bg); border: none; 
        padding: 18px; width: 100%; border-radius: 10px; 
        font-weight: 900; font-size: 1rem; text-transform: uppercase; 
        cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .action-btn:hover { background: var(--accent); color: white; }
    .action-btn.shake { animation: shake 0.4s ease-in-out; background: var(--error); color: white; }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
    }

    .footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border); }
    .vol-val { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; color: var(--accent); font-weight: 700; margin-top: 8px; }

    #main { flex: 1; position: relative; background: var(--plot-bg); }
    #plot { width: 100%; height: 100%; }
    .error-log { color: var(--error); font-size: 0.9rem; margin-top: 16px; padding: 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); display: none; }

    /* Mobile Interaction Logic */
    #mobile-tabs { display: none; }
    #float-res { display: none; }

    @media (max-width: 1024px) {
        body { flex-direction: column; overflow: hidden; }
        #main { height: 45vh; width: 100%; flex: none; position: relative; }
        #sidebar { 
            width: 100%; min-width: 0; height: 55vh; 
            padding: 0; border-right: none; border-top: 1px solid var(--border);
            gap: 0; overflow-y: auto;
        }
        
        #float-res { 
            display: flex; align-items: center; gap: 12px;
            position: absolute; top: 16px; right: 16px; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); 
            padding: 10px 16px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; z-index: 30;
        }
        [data-theme="light"] #float-res { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.1); }
        
        #float-res .m-toggle {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; border: none; color: var(--accent);
        }
        [data-theme="light"] #float-res .m-toggle { background: rgba(0,0,0,0.05); }

        #float-res .res-info { pointer-events: none; }
        #float-res .label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; opacity: 0.7; letter-spacing: 0.05em; line-height: 1; }
        #float-res .val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; color: var(--accent); line-height: 1.2; margin-top: 2px; }

        #mobile-tabs { 
            display: flex; background: var(--sidebar); 
            border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 40;
        }
        .m-tab { 
            flex: 1; padding: 14px; text-align: center; font-size: 0.75rem; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .m-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(245, 158, 11, 0.05); }

        .s-section { padding: 20px; display: none; }
        .s-section.active { display: block; }

        header { 
            padding: 20px 20px 10px 20px; 
            display: flex; flex-direction: column; 
            border-bottom: 1px solid var(--border); 
            background: var(--sidebar);
        }
        header .title-area { max-width: 70%; } /* Leave space for floating card */
        header h1 { font-size: 0.95rem; }
        header p { display: block; font-size: 0.65rem; margin-top: 4px; opacity: 0.8; }
        
        #theme-toggle { display: none !important; } /* Hide desktop toggle on mobile */

        .math-kb { grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .kb-btn { padding: 8px 2px; font-size: 0.7rem; }
        
        #mainBtn { 
            position: fixed; bottom: 20px; right: 20px; width: auto; 
            padding: 16px 24px; border-radius: 50px; font-size: 0.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100;
        }
        .footer { display: none; }
    }
</style>
</head>
<body>

<div id="float-res">
    <button class="m-toggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="m-sun" class="hidden" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <svg id="m-moon" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>
    <div class="res-info">
        <div class="label">Volume</div>
        <div id="float-val" class="val">--</div>
    </div>
</div>

<div id="sidebar">
    <header>
        <div class="title-area">
            <h1>AP Calculus</h1>
            <h1 style="font-size: 1rem; color: var(--muted); margin-top: 4px;">Volumes w Cross Sections</h1>
            <p style="margin-top: 8px;">Made by Lingqi Mo with Google Gemini</p>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    </header>

    <div id="mobile-tabs">
        <div class="m-tab active" onclick="switchTab('eq', this)">Equations</div>
        <div class="m-tab" onclick="switchTab('param', this)">Parameters</div>
    </div>

    <div id="sec-eq" class="s-section active">
        <div class="group-title">1. Functions</div>
        <div class="field">
            <label>Upper Bound f(x)</label>
            <input type="text" id="fIn" value="sqrt(x)" oninput="updatePreview()" onfocus="lastFocused=this">
            <div id="fPre" class="math-preview"></div>
        </div>
        <div class="field">
            <label>Lower Bound g(x)</label>
            <input type="text" id="gIn" value="0" oninput="updatePreview()" onfocus="lastFocused=this">
            <div id="gPre" class="math-preview"></div>
        </div>
        
        <div class="math-kb">
            <button class="kb-btn" onclick="insert('^2')">x²</button>
            <button class="kb-btn" onclick="insert('^3')">x³</button>
            <button class="kb-btn" onclick="insert('^')">xⁿ</button>
            <button class="kb-btn" onclick="insert('sqrt(')">√x</button>
            <button class="kb-btn" onclick="insert('cbrt(')">∛x</button>
            <button class="kb-btn" onclick="insert('root(x, 3)')">ⁿ√x</button>
            <button class="kb-btn" onclick="insert('pi')">π</button>
            <button class="kb-btn" onclick="insert('e')">e</button>
            <button class="kb-btn" onclick="insert('sin(')">sin</button>
            <button class="kb-btn" onclick="insert('cos(')">cos</button>
            <button class="kb-btn" onclick="insert('tan(')">tan</button>
            <button class="kb-btn" onclick="insert('log(')">ln</button>
        </div>
    </div>

    <div id="sec-param" class="s-section">
        <div class="group-title">2. Parameters</div>
        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
            <div style="flex: 1;">
                <label style="font-size: 0.9rem; color: var(--muted); font-weight: 600;">Start (a)</label>
                <input type="number" id="xA" value="0" step="0.5">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.9rem; color: var(--muted); font-weight: 600;">End (b)</label>
                <input type="number" id="xB" value="4" step="0.5">
            </div>
        </div>
        <div class="field">
            <label>Cross Section Shape</label>
            <select id="shape">
                <option value="square">Squares</option>
                <option value="semicircle">Semicircles</option>
                <option value="equilateral">Equilateral Triangles</option>
                <option value="iso_right">Isosceles Right Triangles</option>
            </select>
        </div>
        <div class="field">
            <label>Precision: <span id="nVal" style="color: var(--accent)">30</span> Slices</label>
            <input type="range" id="nSl" min="2" max="100" value="30" oninput="document.getElementById('nVal').innerText = this.value">
        </div>
    </div>

    <button id="mainBtn" class="action-btn" onclick="render()">Build Model</button>
    <div id="errLog" class="error-log"></div>

    <div class="footer">
        <div class="group-title">Calculated Volume</div>
        <div id="res" class="vol-val">--</div>
    </div>
</div>

<div id="main">
    <div id="plot"></div>
</div>

<script>
    let lastFocused = document.getElementById('fIn');
    const root = (x, n) => Math.pow(x, 1/n);

    function switchTab(type, el) {
        document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.s-section').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('sec-' + type).classList.add('active');
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        const sun = document.getElementById('m-sun');
        const moon = document.getElementById('m-moon');
        const isCurrentlyDark = !body.hasAttribute('data-theme');
        
        if (isCurrentlyDark) {
            body.setAttribute('data-theme', 'light');
            btn.innerText = 'Dark Mode';
            sun.classList.remove('hidden');
            moon.classList.add('hidden');
        } else {
            body.removeAttribute('data-theme');
            btn.innerText = 'Light Mode';
            sun.classList.add('hidden');
            moon.classList.remove('hidden');
        }
        render(); 
    }

    function insert(v) {
        const s = lastFocused.selectionStart;
        lastFocused.value = lastFocused.value.substring(0, s) + v + lastFocused.value.substring(lastFocused.selectionEnd);
        lastFocused.focus(); lastFocused.selectionStart = lastFocused.selectionEnd = s + v.length;
        updatePreview();
    }

    function smartParse(str) {
        if (!str) return "0";
        let s = str.toLowerCase().trim();
        s = s.replace(/^[fgy]\(x\)\s*=\s*/, '').replace(/^y\s*=\s*/, '');
        s = s.replace(/\bln\b/g, 'log').replace(/\bpi\b/g, 'Math.PI').replace(/\be\b/g, 'Math.E');
        const fns = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'log', 'exp', 'sqrt', 'cbrt', 'abs'];
        fns.forEach(f => {
            const re = new RegExp(`\\b${f}(?!\\()(\\s*[a-z\\d\\.\\*\\+\\-\\/\\^]+)`, 'g');
            s = s.replace(re, `${f}($1)`);
        });
        s = s.replace(/\s+/g, '');
        s = s.replace(/(\d)([a-z\(])/g, '$1*$2').replace(/(\))([\da-z\(])/g, '$1*$2').replace(/\bx\(/g, 'x*(').replace(/\^/g, '**');
        fns.forEach(f => {
            const re = new RegExp(`\\b${f}\\b`, 'g');
            s = s.replace(re, (m, off, full) => full.substring(off-5, off) === 'Math.' ? m : `Math.${m}`);
        });
        return s;
    }

    function getFn(str) {
        try {
            const p = smartParse(str);
            const fn = new Function('x', 'root', `return ${p};`);
            fn(1, root); return (v) => fn(v, root);
        } catch (e) { return null; }
    }

    function updatePreview() {
        const fR = document.getElementById('fIn').value, gR = document.getElementById('gIn').value;
        const toLatex = (str) => {
            let s = str.toLowerCase().trim();
            const fns = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'log', 'exp', 'sqrt', 'cbrt', 'abs'];
            fns.forEach(f => {
                const re = new RegExp(`\\b${f}(?!\\()(\\s*[a-z\\d\\.\\*\\+\\-\\/\\^]+)`, 'g');
                s = s.replace(re, `${f}($1)`);
            });
            s = s.replace(/\*/g, '');
            s = s.replace(/\bsin\b/g, '\\sin').replace(/\bcos\b/g, '\\cos').replace(/\btan\b/g, '\\tan');
            s = s.replace(/sqrt\((.*?)\)/g, '\\sqrt{$1}').replace(/cbrt\((.*?)\)/g, '\\sqrt[3]{$1}').replace(/root\((.*?), \s*(\d+)\)/g, '\\sqrt[$2]{$1}');
            s = s.replace(/\bpi\b/g, '\\pi');
            return s;
        };
        document.getElementById('fPre').innerHTML = `\\( f(x) = ${toLatex(fR)} \\)`;
        document.getElementById('gPre').innerHTML = `\\( g(x) = ${toLatex(gR)} \\)`;
        if (window.MathJax) MathJax.typesetPromise();
    }

    function render() {
        const fR = document.getElementById('fIn').value, gR = document.getElementById('gIn').value;
        const xA = parseFloat(document.getElementById('xA').value), xB = parseFloat(document.getElementById('xB').value);
        const nS = parseInt(document.getElementById('nSl').value), sh = document.getElementById('shape').value;
        const f = getFn(fR), g = getFn(gR);
        const errLog = document.getElementById('errLog'), btn = document.getElementById('mainBtn');
        
        // 核心修复：检查 html 标签上的 data-theme 属性，而不是 body
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';

        document.getElementById('fIn').classList.remove('invalid'); document.getElementById('gIn').classList.remove('invalid');
        if (!f || !g) {
            errLog.style.display = 'block';
            errLog.innerHTML = `<strong>⚠️ Syntax Error</strong><br>Check ${!f ? 'f(x)' : 'g(x)'} syntax.`;
            document.getElementById(!f ? 'fIn' : 'gIn').classList.add('invalid');
            btn.classList.add('shake'); setTimeout(() => btn.classList.remove('shake'), 400);
            document.getElementById('res').innerText = "ERROR"; return;
        }
        errLog.style.display = 'none';

        const traces = [];
        let vol = 0; const steps = 1000; const dx = (xB - xA) / steps;
        let factor = 1;
        if(sh === 'semicircle') factor = Math.PI / 8;
        else if(sh === 'equilateral') factor = Math.sqrt(3) / 4;
        else if(sh === 'iso_right') factor = 0.5;

        for(let i=0; i<steps; i++) {
            let x = xA + i * dx;
            let s = Math.abs(f(x) - g(x));
            vol += factor * (s * s) * dx;
        }

        const sStep = (xB - xA) / (nS - 1);
        const sliceLineColor = isLight ? 'rgba(180, 83, 9, 0.6)' : 'rgba(255, 159, 10, 0.4)';
        
        for(let i=0; i<nS; i++) {
            let x = xA + i * sStep;
            let y1 = f(x), y2 = g(x);
            let s = Math.abs(y1 - y2);
            if(s < 0.005) continue;
            let midY = (y1 + y2) / 2;
            let px = [], py = [], pz = [], pi = [], pj = [], pk = [];
            if (sh === 'square') {
                px = [x, x, x, x]; py = [y1, y1, y2, y2]; pz = [0, s, s, 0];
                pi = [0, 0]; pj = [1, 2]; pk = [2, 3];
            } else if (sh === 'semicircle') {
                px.push(x); py.push(midY); pz.push(0); // Center point for triangulation
                for(let j=0; j<=24; j++) {
                    let r = Math.PI * (j/24);
                    px.push(x); py.push(midY + (s/2) * Math.cos(r)); pz.push((s/2) * Math.sin(r));
                    if (j > 0) {
                        pi.push(0); pj.push(j); pk.push(j+1);
                    }
                }
            } else if (sh === 'equilateral') {
                px = [x, x, x]; py = [y1, y2, midY]; pz = [0, 0, s*Math.sqrt(3)/2];
                pi = [0]; pj = [1]; pk = [2];
            } else if (sh === 'iso_right') {
                px = [x, x, x]; py = [y1, y2, y1]; pz = [0, 0, s];
                pi = [0]; pj = [1]; pk = [2];
            }
            
            // The "Solid" face trace
            traces.push({ 
                type: 'mesh3d', 
                x: px, y: py, z: pz, 
                i: pi, j: pj, k: pk,
                color: '#F59E0B', 
                opacity: isLight ? 0.4 : 0.6, // Higher opacity for "solid" look
                flatshading: true,
                showscale: false, 
                hoverinfo: 'none' 
            });

            // The "Outline" trace for crisp edges
            traces.push({ 
                type: 'scatter3d', 
                mode: 'lines', 
                x: px.concat(px[0]), 
                y: py.concat(py[0]), 
                z: pz.concat(pz[0]), 
                line: {color: isLight ? 'rgba(0,0,0,0.3)' : 'rgba(245, 158, 11, 0.8)', width: 2}, 
                hoverinfo: 'none',
                showlegend: false 
            });
        }

        const lx = [], ly1 = [], ly2 = [];
        for(let i=0; i<=100; i++) {
            let x = xA + (xB-xA)*(i/100); lx.push(x); ly1.push(f(x)); ly2.push(g(x));
        }
        traces.push({ 
            type: 'scatter3d', 
            mode: 'lines', 
            x: lx.concat(lx.slice().reverse()), 
            y: ly1.concat(ly2.slice().reverse()), 
            z: new Array(202).fill(0), 
            line: {color: isLight ? '#000000' : '#FFFFFF', width: 4}, 
            hoverinfo: 'none',
            name: 'Base' 
        });

        const plotEl = document.getElementById('plot');
        let cam = (plotEl && plotEl.layout && plotEl.layout.scene) ? plotEl.layout.scene.camera : null;

        Plotly.react('plot', traces, {
            dragmode: 'turntable', 
            hovermode: false, 
            paper_bgcolor: isLight ? '#FFFFFF' : '#000000',
            scene: {
                aspectmode: 'data', 
                xaxis:{gridcolor: isLight?'#DDD':'#111', color: isLight?'#333':'#444'}, 
                yaxis:{gridcolor: isLight?'#DDD':'#111', color: isLight?'#333':'#444'}, 
                zaxis:{gridcolor: isLight?'#DDD':'#111', color: isLight?'#333':'#444'},
                camera: cam || { eye: { x: 1.5, y: 1.5, z: 1.2 } },
                annotations: []
            },
            margin: {l:0,r:0,b:0,t:0}, showlegend: false
        }, {responsive: true});

        plotEl.removeAllListeners('plotly_click');
        plotEl.on('plotly_click', function(data) {
            if (!data.points || data.points.length === 0) return;
            const p = data.points[0];
            const annotation = {
                x: p.x, y: p.y, z: p.z,
                text: `<b>(${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})</b>`,
                showarrow: true,
                arrowhead: 2,
                arrowcolor: '#F59E0B',
                font: { color: '#F59E0B', size: 12 },
                bgcolor: isLight ? 'rgba(255,255,255,0.9)' : 'rgba(20,20,20,0.9)',
                bordercolor: '#F59E0B',
                borderwidth: 1,
                ax: 0, ay: -50
            };
            Plotly.relayout('plot', { 'scene.annotations': [annotation] });
        });

        plotEl.on('plotly_doubleclick', function() {
            Plotly.relayout('plot', { 'scene.annotations': [] });
        });

        const vStr = vol.toFixed(5);
        document.getElementById('res').innerText = vStr;
        document.getElementById('float-val').innerText = vStr;
    }
    /**
     * [主题核心引擎]
     * @param {boolean} isDark - 是否进入暗黑模式
     * @param {boolean} persist - 是否存入本地存储（用户手动切换时为 true）
     */
    function applyTheme(isDark, persist = false) {
        const theme = isDark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        if (persist) {
            localStorage.setItem('bc_theme', theme);
        }
        // 如果渲染引擎已就绪，立即重绘 Plotly 图表以适应新配色
        if (typeof render === 'function') render();
    }

    // --- 核心握手协议 (Smart Handshake) ---
    window.addEventListener('message', (event) => {
        // 1. 响应主站的同步指令
        if (event.data && event.data.type === 'THEME_UPDATE') {
            // 修复：始终听从主站的实时切换指令，确保全站风格统一
            applyTheme(event.data.isDarkMode);
        }
    });

    // 告知父窗口：握手准备就绪，可以发送初始主题了
    try {
        window.parent.postMessage({ type: 'EXTENSION_READY' }, '*');
    } catch(e) {}

    // 手动切换按钮逻辑
    const themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
        themeBtn.onclick = () => {
            const isCurrentlyDark = document.documentElement.getAttribute('data-theme') !== 'light';
            applyTheme(!isCurrentlyDark, true); // 切换并保存
        };
    }

    window.onload = () => { 
        updatePreview(); 
        render(); 
    };
</script>

</body>
</html>
