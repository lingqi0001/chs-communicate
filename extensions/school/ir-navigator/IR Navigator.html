<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Studio | Advanced Research Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="../../../js/lucide.min.js"></script>
    <!-- 1. 寮曞叆 App Bridge SDK -->
    <script src="../../../js/app-bridge.js?v=20260520-2205"></script>
    <!-- 2. 引入 Extracted Research Canvas Engine -->
    <script src="canvas.js?v=20260521"></script>
    
    <style>
        :root {
            --bg: #000000; --sidebar: #0C0C0E; --card: #121214; --accent: #F59E0B;
            --border: #27272A; --text: #F4F4F5; --muted: #71717A; --success: #10B981; --danger: #EF4444;
            --hover-bg: rgba(245, 158, 11, 0.1);
        }
        [data-theme="light"] {
            --bg: #F8F8FA; --sidebar: #FFFFFF; --card: #FFFFFF; --accent: #B45309;
            --border: #E4E4E7; --text: #09090B; --muted: #71717A;
            --hover-bg: rgba(180, 83, 9, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        aside { width: 260px; min-width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 32px 20px; z-index: 50; }
        .aside-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 10px;
        }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; margin-bottom: 4px; color: var(--muted); font-size: 13px; font-weight: 600; }
        .nav-item:hover { background: var(--hover-bg); color: var(--text); }
        .nav-item.active { background: var(--hover-bg); color: var(--accent); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: #333; transition: 0.3s; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 12px var(--success); }

        main { flex-grow: 1; overflow-y: auto; padding: 40px; position: relative; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 36px; margin-bottom: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        
        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.06em; margin-bottom: 4px; }
        .btn-mini { background: transparent; border: 1px solid var(--border); padding: 8px 16px; border-radius: 10px; color: var(--text); font-size: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; gap: 8px; height: 40px; box-sizing: border-box; }
        .btn-mini * { pointer-events: none; }
        .btn-mini:hover { border-color: var(--accent); color: var(--accent); background: var(--hover-bg); }
        .btn-accent { background: var(--accent) !important; color: #000 !important; border: none !important; font-weight: 900 !important; transition: none !important; }
        .btn-accent:hover { background: var(--accent) !important; color: #000 !important; border: none !important; opacity: 1 !important; transition: none !important; }

        .item-row { display: flex; align-items: center; gap: 16px; padding: 20px; background: rgba(255,255,255,0.015); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 12px; transition: 0.2s; }
        .item-row.done { border-color: var(--success); background: rgba(16, 185, 129, 0.04); }

        .task-date { font-size: 9px; font-weight: 900; color: var(--accent); background: rgba(245, 158, 11, 0.12); padding: 3px 8px; border-radius: 5px; margin-top: 4px; display: inline-block; }
        .del-btn { color: var(--danger); opacity: 0.4; cursor: pointer; transition: 0.2s; padding: 6px; }
        .del-btn:hover { opacity: 1 !important; transform: scale(1.2); }

        .view-toggle { background: var(--sidebar); border: 1px solid var(--border); padding: 4px; border-radius: 10px; display: flex; }
        .toggle-btn { padding: 6px 14px; border-radius: 8px; border: none; font-size: 10px; font-weight: 800; cursor: pointer; background: transparent; color: var(--muted); }
        .toggle-btn.active { background: var(--accent); color: #000; }

        /* SPLIT BUTTON GROUP FOR VIEWING SOURCES */
        .split-btn-group {
            display: inline-flex;
            align-items: center;
            background: var(--accent);
            border-radius: 10px;
            overflow: hidden;
            border: none;
            height: 32px;
        }
        .split-btn-left {
            background: transparent;
            border: none;
            appearance: none;
            color: #000 !important;
            font-size: 10px;
            font-weight: 900;
            text-decoration: none !important;
            padding: 0 12px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: opacity 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }
        .split-btn-left:hover {
            opacity: 0.8;
            text-decoration: none !important;
        }
        .split-btn-divider {
            width: 1px;
            height: 16px;
            background: rgba(0, 0, 0, 0.25);
        }
        .split-btn-right {
            background: transparent;
            border: none;
            color: #000 !important;
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .split-btn-right:hover {
            opacity: 0.8;
        }

        /* BY DEFAULT HIDDEN - SHOWN ONLY FOR TEACHER/ADMIN VIEW */
        .teacher-only { display: none; }
        .banner { padding: 16px 24px; background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--accent); border-radius: 10px; margin-bottom: 32px; display: none; align-items: center; gap: 12px; }

        .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal {
            background: var(--sidebar);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }
        .field { margin-bottom: 24px; }
        .field label { display: block; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .field input, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: var(--text); font-size: 14px; outline: none; }

        /* LITERATURE CARDS */
        .lit-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(59,130,246,0.06);
            border: 1px solid rgba(59,130,246,0.2);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            max-width: 320px;
            margin-top: 6px;
        }
        .lit-card:hover { border-color: #3B82F6; background: rgba(59,130,246,0.12); }
        .lit-card-icon {
            width: 28px; height: 28px; border-radius: 6px;
            background: var(--card); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .lit-card-icon img { width: 18px; height: 18px; }
        .lit-card-info { min-width: 0; flex: 1; }
        .lit-card-domain { font-size: 10px; color: #3B82F6; font-weight: 700; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lit-card-url { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .feedback-badge {
            font-size: 9px; font-weight: 900; color: var(--accent);
            background: rgba(245,158,11,0.15); padding: 2px 6px;
            border-radius: 6px; margin-left: 6px;
        }

        /* NOTIFICATIONS BADGE & TIMELINE */
        .nav-badge {
            background: var(--danger);
            color: #fff;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: auto;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
            animation: badge-pulse 2s infinite;
        }
        @keyframes badge-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(239, 68, 68, 0.8); }
            100% { transform: scale(1); }
        }
        .notif-card {
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .notif-card:hover {
            border-color: var(--accent);
            background: var(--hover-bg);
        }
        .notif-unread {
            border-left: 3px solid var(--accent);
            background: rgba(245, 158, 11, 0.03);
        }

        /* CONCEPT MINDMAP CANVAS */
        .canvas-container {
            width: 100%;
            height: 580px;
            background-color: var(--sidebar);
            background-image: 
                radial-gradient(var(--border) 1px, transparent 0),
                radial-gradient(var(--border) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            border: 1px solid var(--border);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            user-select: none;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }
        #canvas-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
        }
        .canvas-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        .canvas-node {
            position: absolute;
            padding: 16px 20px;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            min-width: 180px;
            max-width: 260px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: border-color 0.2s, box-shadow 0.2s;
            z-index: 10;
        }
        .canvas-node:active {
            cursor: grabbing;
        }
        .canvas-node.theme-node {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.15);
        }
        .canvas-node.source-node {
            border-color: #3B82F6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }
        .canvas-node.note-node {
            border-color: var(--muted);
        }
        .canvas-node-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .canvas-node-desc {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.4;
        }
        .node-socket {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: crosshair;
            border: 2px solid var(--card);
            z-index: 20;
            transition: transform 0.2s;
        }
        .node-socket:hover {
            transform: translateY(-50%) scale(1.3);
        }
        .node-socket.left-socket {
            left: -6px;
            right: auto;
            background: #3B82F6;
        }
        .node-socket.top-socket {
            left: 50%;
            top: -6px;
            right: auto;
            transform: translateX(-50%);
            background: #3B82F6;
        }
        .node-socket.bottom-socket {
            left: 50%;
            top: auto;
            bottom: -6px;
            right: auto;
            transform: translateX(-50%);
            background: #3B82F6;
        }
        .node-socket.top-socket:hover,
        .node-socket.bottom-socket:hover {
            transform: translateX(-50%) scale(1.3);
        }
        .node-del-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            border: none;
            color: var(--muted);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s, color 0.2s;
        }
        .canvas-node:hover .node-del-btn {
            opacity: 0.6;
        }
        .canvas-node:hover .node-del-btn:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.7);
        }
        .canvas-node:hover .node-del-btn.danger-btn:hover {
            color: var(--danger);
        }
        .canvas-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 10000px;
            height: 10000px;
            pointer-events: auto;
            z-index: 5;
        }
        .canvas-line {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5px;
            stroke-linecap: round;
            stroke-dasharray: 4 4;
            animation: connection-flow 20s linear infinite;
            pointer-events: stroke;
            cursor: pointer;
        }
        .canvas-line-hit {
            fill: none;
            stroke: transparent;
            stroke-width: 10px;
            pointer-events: stroke;
            cursor: pointer;
        }
        .canvas-line.bidirectional {
            stroke: #22D3EE;
        }
        .canvas-line.dimmed {
            opacity: 0.15;
        }
        .canvas-edge-label {
            font-size: 10px;
            fill: var(--text);
            paint-order: stroke;
            stroke: var(--sidebar);
            stroke-width: 3px;
            stroke-linejoin: round;
            font-weight: 700;
        }
        .canvas-node.selected {
            outline: 2px solid #22D3EE;
            outline-offset: 2px;
        }
        .canvas-node.dimmed {
            opacity: 0.25;
        }
        .canvas-node .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .canvas-frame {
            position: absolute;
            border: 2px dashed rgba(34, 211, 238, 0.55);
            background: rgba(34, 211, 238, 0.08);
            border-radius: 12px;
            z-index: 8;
            cursor: move;
        }
        .canvas-frame-title {
            position: absolute;
            top: -20px;
            left: 0;
            font-size: 10px;
            font-weight: 800;
            color: #22D3EE;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 999px;
        }
        .frame-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(34, 211, 238, 0.7) 50%);
            border-bottom-right-radius: 10px;
        }
        .frame-del-btn {
            position: absolute;
            top: -20px;
            right: 0;
            background: rgba(239, 68, 68, 0.8);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            z-index: 10;
        }
        .frame-del-btn:hover {
            background: rgb(239, 68, 68);
        }
        .selection-box {
            position: absolute;
            border: 1px dashed #22D3EE;
            background: rgba(34,211,238,0.16);
            z-index: 30;
            pointer-events: none;
            display: none;
        }
        .canvas-toolbar-input {
            background: var(--sidebar);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            min-width: 190px;
            flex: 1 1 240px;
            font-size: 12px;
            outline: none;
        }
        .canvas-tool-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            flex: 0 0 40px;
            padding: 0;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            line-height: 0;
        }
        .canvas-toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
        }
        .canvas-float-controls {
            position: absolute;
            right: 16px;
            bottom: 146px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 36;
            background: rgba(12, 12, 14, 0.75);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
        }
        .canvas-mini-map {
            position: absolute;
            right: 16px;
            bottom: 16px;
            width: 170px;
            height: 120px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(12, 12, 14, 0.75);
            z-index: 35;
            overflow: hidden;
        }
        .canvas-mini-node {
            position: absolute;
            border-radius: 2px;
            background: rgba(245, 158, 11, 0.85);
        }
        .canvas-mini-view {
            position: absolute;
            border: 1px solid #22D3EE;
            background: rgba(34, 211, 238, 0.12);
        }
        /* RESEARCH CANVAS FULLSCREEN MODE (ONLY FOR CANVAS TOOL) */
        body.canvas-fullscreen main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 0;
        }
        body.canvas-fullscreen header {
            display: none !important;
        }
        body.canvas-fullscreen #canvas-card {
            display: flex !important;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 12px 12px 0;
            margin-bottom: 0;
        }
        body.canvas-fullscreen .canvas-container {
            flex: 1;
            min-height: 0;
            height: auto;
            margin-bottom: 0;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        body.canvas-fullscreen #heatmap-card {
            display: none !important;
        }
        body.notifs-mode #heatmap-card {
            display: none !important;
        }
        .details-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100vh;
            background: var(--sidebar);
            border-left: 1px solid var(--border);
            z-index: 2200;
            transition: right 0.25s ease;
            padding: 20px;
            overflow-y: auto;
        }
        .details-drawer.open {
            right: 0;
        }
        .details-drawer h3 {
            font-size: 16px;
            margin-bottom: 14px;
        }
        @keyframes connection-flow {
            to { stroke-dashoffset: -20; }
        }

        /* RATING & STICKY FEEDBACK COMMENTS */
        .rating-stars {
            display: flex;
            gap: 6px;
            margin: 10px 0;
        }
        .star-icon {
            cursor: pointer;
            color: var(--border);
            transition: color 0.15s, transform 0.15s;
        }
        .star-icon.active {
            color: var(--accent);
            filter: drop-shadow(0 0 4px var(--accent));
        }
        .star-icon:hover {
            transform: scale(1.25);
        }
        .sticky-notes-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }
        .sticky-note {
            padding: 18px;
            border-radius: 14px;
            color: #1c1917;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .sticky-note:hover {
            transform: scale(1.01);
        }
        .sticky-note.yellow { background: #FEF08A; }
        .sticky-note.pink { background: #FBCFE8; }
        .sticky-note.green { background: #BBF7D0; }
        .sticky-note.blue { background: #BFDBFE; }
        .sticky-note-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 6px;
        }
        .sticky-note-text {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.45;
        }
        .sticky-note-replies {
            margin-top: 14px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sticky-reply {
            font-size: 11px;
            background: rgba(255,255,255,0.45);
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.35;
        }

        /* PRINT MEDIA STYLING */
        @media print {
            body { background: #ffffff !important; color: #000000 !important; }
            aside, header, .btn-mini, .modal-wrap, #broadcast-banner, .canvas-controls, .node-del-btn, .node-socket { display: none !important; }
            main { padding: 0 !important; width: 100% !important; overflow: visible !important; }
            .card { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 0 30px 0 !important; }
            .print-only { display: block !important; }
            .canvas-container { border: 2px solid #ccc !important; background: #fafafa !important; height: auto !important; min-height: 400px !important; overflow: visible !important; }
            .canvas-node { border: 1.5px solid #666 !important; background: #fff !important; color: #000 !important; box-shadow: none !important; position: absolute !important; }
            .canvas-node-title { color: #000 !important; }
            .canvas-node-desc { color: #555 !important; }
            .canvas-line { stroke: #333 !important; animation: none !important; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="aside-brand">
            <div style="font-weight:900; font-size:1.6rem; color:var(--accent); letter-spacing:-2px;">IR STUDIO</div>
            <button class="btn-mini" onclick="toggleTheme()" title="Toggle theme"><i id="theme-icon" data-lucide="sun" size="14"></i></button>
        </div>
        
        <div style="font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Research Stages</div>
        <nav id="path-nav" style="margin-bottom:24px;"></nav>
        
        <div style="font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Studio Tools</div>
        <nav id="tools-nav">
            <div id="nav-canvas" class="nav-item" onclick="switchToTool('canvas')">
                <i data-lucide="git-branch" size="14" style="margin-right:8px; pointer-events: none;"></i>
                Research Canvas
            </div>
            <div id="nav-notifs" class="nav-item" onclick="switchToTool('notifs')">
                <i data-lucide="bell" size="14" style="margin-right:8px; pointer-events: none;"></i>
                Notifications
                <span id="notif-count" class="nav-badge" style="display:none;">0</span>
            </div>
        </nav>

        <div style="margin-top:auto; display:flex; align-items:center; padding:10px;">
            <div id="sync-dot" class="status-dot"></div>
            <div id="user-status" style="font-size:10px; color:var(--muted); font-weight:900; text-transform:uppercase;">Searching...</div>
        </div>
    </aside>

    <main>
        <div id="broadcast-banner" class="banner" style="justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 12px; flex-grow: 1;">
                <i data-lucide="megaphone" size="20" style="color:var(--accent); flex-shrink: 0;"></i>
                <div id="broadcast-text" style="font-weight:700; font-size:14px;"></div>
            </div>
            <button id="broadcast-delete" class="del-btn teacher-only" onclick="deleteBroadcast()" style="background: transparent; border: none; padding: 4px; display: none; align-items: center; justify-content: center; cursor: pointer; opacity: 0.6; transition: 0.2s;">
                <i data-lucide="trash-2" size="16" style="color: var(--danger);"></i>
            </button>
        </div>

        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <div><h1 id="h-title">IR Navigator</h1><p id="h-subtitle" style="color:var(--muted); font-size:14px; font-weight:600;">System Bridge Standby</p></div>
            <div style="display:flex; gap:12px; align-items:center;">
                <!-- ADMIN CONTROLS: HIDDEN BY DEFAULT, SHOWN ONLY FOR MASTER -->
                <div id="admin-controls" style="display:none; gap:12px; align-items:center;">
                    <button class="btn-mini" onclick="openModal('broadcast')"><i data-lucide="megaphone" size="14"></i> BROADCAST</button>
                    <div class="view-toggle">
                        <button id="btn-t" class="toggle-btn active" onclick="setView('teacher')">TEACHER</button>
                        <button id="btn-s" class="toggle-btn" onclick="setView('student')">STUDENT</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="card" id="milestones-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
                <h3 style="font-size:0.75rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.18em;">Milestones & Project Management</h3>
                <div style="display:flex; gap:12px; align-items:center;">
                    <b id="percent-text" style="color:var(--accent); font-size:1.8rem; margin-right:10px;">0%</b>
                    <button class="teacher-only btn-mini btn-accent" id="add-task-btn" onclick="openModal('addTask')">+ ADD TASK</button>
                </div>
            </div>
            <div id="m-list"></div>
        </div>

        <div class="card" id="matrix-card" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3>Synthesis Matrix</h3>
                <div style="display:flex; gap:10px;">
                    <div class="view-toggle">
                        <button id="m-btn-t" class="toggle-btn active" onclick="setMatrixView('table')">TABLE</button>
                        <button id="m-btn-th" class="toggle-btn" onclick="setMatrixView('theme')">THEMES</button>
                    </div>
                    <button class="btn-mini btn-accent" onclick="openModal('matrix')">+ SOURCE</button>
                </div>
            </div>
            <div id="matrix-content"></div>
        </div>

        <div class="card" id="canvas-card" style="display:none;">
            <div class="canvas-toolbar-row">
                <input id="canvas-search" class="canvas-toolbar-input" placeholder="Search / Filter cards..." oninput="applyCanvasSearch()">
                <button class="btn-mini" id="canvas-help" onclick="openModal('help')" title="Help">HELP</button>
                <button class="btn-mini canvas-tool-icon" id="canvas-tool-select" onclick="setCanvasToolMode('select')" title="Select"><i data-lucide="mouse-pointer-2" size="18"></i></button>
                <button class="btn-mini canvas-tool-icon" id="canvas-tool-hand" onclick="setCanvasToolMode('hand')" title="Hand"><i data-lucide="hand" size="18"></i></button>
                <button class="btn-mini btn-accent" id="canvas-add-theme" onclick="addCanvasNodePrompt('theme')">+ THEME</button>
                <button class="btn-mini btn-accent" id="canvas-add-source" onclick="addCanvasNodePrompt('source')">+ SOURCE</button>
                <button class="btn-mini btn-accent" id="canvas-add-note" onclick="addCanvasNodePrompt('note')">+ NOTE</button>
                <button class="btn-mini btn-accent" onclick="createFrameFromSelection()">+ FRAME</button>
                <button class="btn-mini" onclick="exportPDFReport()" style="border-color:var(--success); color:var(--success);"><i data-lucide="download" size="12"></i> EXPORT REPORT</button>
            </div>
            
            <div class="canvas-container" id="canvas-container" ondragover="event.preventDefault()">
                <div id="canvas-content">
                    <svg class="canvas-svg" id="canvas-svg"></svg>
                </div>
                <div class="canvas-float-controls">
                    <button class="btn-mini" onclick="adjustCanvasZoom(-10)">-</button>
                    <button class="btn-mini" id="canvas-zoom-label" onclick="resetCanvasZoom()">100%</button>
                    <button class="btn-mini" onclick="adjustCanvasZoom(10)">+</button>
                </div>
                <div id="canvas-mini-map" class="canvas-mini-map"></div>
            </div>
        </div>

        <div class="card" id="notifs-card" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3>Notifications & Feedback</h3>
                <button class="btn-mini" onclick="markAllNotificationsAsRead()">MARK ALL AS READ</button>
            </div>
            <div id="notifs-list"></div>
        </div>

        <div class="card teacher-only" id="heatmap-card">
            <h3>Classroom Heatmap</h3>
            <div id="heatmap" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px; margin-bottom:32px;"></div>
            <div style="border-top:1px solid var(--border); padding-top:24px; display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:11px; color:var(--muted); font-weight:800;">ADMIN CONSOLE</div>
                <button class="btn-mini" style="border-color:var(--danger); color:var(--danger);" onclick="resetAllData()">RESET ALL DATA</button>
            </div>
        </div>
    </main>

    <div id="modal-wrap" class="modal-wrap" onclick="if(event.target==this) closeModal()">
        <div class="modal">
            <h2 id="modal-title" style="font-weight:900; margin-bottom:28px; font-size:1.4rem;">Action Required</h2>
            <div id="modal-body"></div>
            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
                <button class="btn-mini" onclick="closeModal()">CANCEL</button>
                <button id="modal-submit" class="btn-mini btn-accent" style="padding:12px 28px;">EXECUTE</button>
            </div>
        </div>
    </div>
    <div id="details-drawer" class="details-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="details-drawer-title">Node Details</h3>
            <button class="btn-mini" onclick="closeDetailsDrawer()">Close</button>
        </div>
        <div id="details-drawer-body"></div>
    </div>

    <script>
        var STAGES = [
            { name: "Building Community", defaultTasks: ["What do you Meme?", "Canvas Scavenger Hunt", "Intro. Survey", "Me in a minute!", "Intro Research Task", "Internet Searches Activity", "Researcher Reflection", "Reading Report #1", "Reading Report #2", "What's Your IQ?"] },
            { name: "Inquiry & Hypothesis", defaultTasks: ["Hypothesis Practice", "Research Q Chart", "Hypothesis (Part 1)", "Peer Edit: Q & H", "Hypothesis (Part 2)", "Finding HR", "Business Email (Draft)", "Email Netiquette", "Presentation Review", "Reflection Quiz"] },
            { name: "Literature Review", defaultTasks: ["Synthesis Table", "Organization Activity", "Intro Planning", "Rough Draft #1", "Peer Review #1", "Rough Draft #2", "Peer Review #2", "Rough Draft #3", "Peer Review #3", "Final Lit Review"] },
            { name: "Primary Research", defaultTasks: ["Data Collection Intro", "Collection Plan", "Checkpoint #1", "Checkpoint #2", "Checkpoint #3", "Methods vs. Tools", "Primary Timeline", "Planning Sheet", "Research Design PPT", "Collection Packet"] },
            { name: "The Grand Finale", defaultTasks: ["Data Analysis Info", "Essay Draft", "Self-Review", "Printed Copy (PD2)", "Final Paper (150pt)", "Presentation/Exam", "Reflective Port", "Course Eval", "Learning Conf", "The Grand Finale"] }
        ];

        var currentUser = { id: 'anon' }, currentIdx = 0, viewMode = 'student', matrixView = 'table', isAdmin = false;
        var myProgress = {}, myLinks = {}, myMatrix = {}, currentTasks = [];
        var taskFeedback = {}; // { stageIdx_taskIdx_uid: { rating, notes: [{color,text,author,time,replies}] } }
        var currentFbKey = null, currentFeedbackUid = null, currentFeedbackDisplayName = null, currentFeedbackLink = null;

        function getBridge() {
            const b = window.parent || window.top || window.opener;
            if (b && b.fSet && b.firebaseDb) { 
                document.getElementById('sync-dot').classList.add('online'); 
                document.getElementById('h-subtitle').innerText = "Bridge Sync: Established";
                return b; 
            }
            return null;
        }

        // SDK 宸插鐞嗗垵濮嬪寲锛屾澶勪笉鍐嶉渶瑕?syncTheme 鍑芥暟
        


        window.setMatrixView = (m) => { matrixView = m; renderMatrix(); };
        window.renderMatrix = () => {
            const container = document.getElementById('matrix-content'); if (!container) return;
            container.innerHTML = '';
            if (matrixView === 'table') {
                let html = `<table style="width:100%; border-collapse:collapse; font-size:13px;">
                    <tr style="border-bottom:1px solid var(--border); color:var(--muted); font-size:10px; text-transform:uppercase;">
                        <th style="padding:15px; text-align:left;">Theme</th><th style="padding:15px; text-align:left;">Source</th><th style="padding:15px; text-align:left;">Notes</th>
                    </tr>`;
                Object.entries(myMatrix).forEach(([id, data]) => {
                    html += `<tr style="border-bottom:1px solid var(--border);">
                        <td style="padding:15px; font-weight:700; color:var(--accent);">${data.theme||'Untitled'}</td>
                        <td style="padding:15px;">${data.source||'-'}</td>
                        <td style="padding:15px; color:var(--muted);">${data.notes||'-'}</td>
                    </tr>`;
                });
                container.innerHTML = html + `</table>`;
            } else {
                container.innerHTML = `<div style="padding:20px; color:var(--muted);">Theme grouping view is under construction...</div>`;
            }
        };

        window.initHeatmap = () => {
            const b = getBridge(); if (!b) return;
            const container = document.getElementById('heatmap'); if (!container) return;
            b.fOnValue(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/meta'), snap => {
                container.innerHTML = '';
                const users = snap.val() || {};
                Object.entries(users).forEach(([uid, data]) => {
                    const p = data.percent || 0;
                    container.innerHTML += `
                        <div class="item-row" style="margin-bottom:0; flex-direction:column; align-items:flex-start; gap:8px;">
                            <div style="display:flex; justify-content:space-between; width:100%;">
                                <b style="font-size:12px;">${data.name || 'Student'}</b>
                                <span style="color:var(--accent); font-weight:900;">${p}%</span>
                            </div>
                            <div style="width:100%; height:4px; background:#333; border-radius:10px; overflow:hidden;">
                                <div style="width:${p}%; height:100%; background:var(--accent); transition:0.5s;"></div>
                            </div>
                            <div style="font-size:9px; color:var(--muted);">STAGE ${data.stage || 0}: ${STAGES[data.stage||0].name}</div>
                        </div>
                    `;
                });
            });
        };

        const formatUrl = (url) => {
            if (!url) return '';
            const trimmed = url.trim();
            if (/^(https?:\/\/|\/\/)/i.test(trimmed)) return trimmed;
            return 'https://' + trimmed;
        };
        window.formatUrl = formatUrl;

        function getDomain(url) {
            try { return new URL(url.startsWith('http') ? url : 'https://' + url).hostname; } catch(e) { return url; }
        }
        function getFavicon(url) {
            const d = getDomain(url);
            return `https://www.google.com/s2/favicons?domain=${d}&sz=32`;
        }
        function buildLitCard(link, onclick) {
            const d = getDomain(link);
            return `<div class="lit-card" onclick="${onclick}">
                <div class="lit-card-icon"><img src="${getFavicon(link)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%233B82F6%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><text x=%2212%22 y=%2216%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2212%22>馃敆</text></svg>'"></div>
                <div class="lit-card-info">
                    <div class="lit-card-domain">${d}</div>
                    <div class="lit-card-url">${link}</div>
                </div>
            </div>`;
        }

        window.openSubs = (idx, taskName) => {
            const b = getBridge(); if (!b) return;
            const wrap = document.getElementById('modal-wrap'), body = document.getElementById('modal-body'), sub = document.getElementById('modal-submit');
            wrap.style.display = 'flex'; document.getElementById('modal-title').innerText = "SUBMISSIONS: " + taskName;
            sub.style.display = 'none';
            body.innerHTML = '<div style="color:var(--muted);">Loading student artifacts...</div>';
            
            b.fOnValue(b.fRef(b.firebaseDb, `user_image_index/ir_v7/meta`), metaSnap => {
                const usersMeta = metaSnap.val() || {};
                b.fOnValue(b.fRef(b.firebaseDb, `user_image_index/ir_v7/links`), snap => {
                    const allLinks = snap.val() || {};
                    let html = '<div style="display:flex; flex-direction:column; gap:14px;">';
                    let count = 0;
                    Object.entries(allLinks).forEach(([uid, stages]) => {
                        const link = stages[currentIdx]?.[idx];
                        if (link) {
                            count++;
                            const uMeta = usersMeta[uid] || {};
                            const displayName = uMeta.name || (uid.startsWith('test_') ? uid : uid.substring(0, 8) + '...');
                            const email = uMeta.email || 'Unregistered or legacy student';
                            const fbKey = `${currentIdx}_${idx}_${uid}`;
                            const fb = taskFeedback[fbKey] || {};
                            const noteCount = (fb.notes || []).length;
                            html += `
                                <div class="item-row" style="padding:16px; display:flex; flex-direction:column; gap:10px;">
                                    <div style="display:flex; align-items:center; width:100%;">
                                        <div style="flex-grow:1; display:flex; flex-direction:column; gap:2px;">
                                            <b style="font-size:14px; color:var(--text);">${displayName}</b>
                                            <span style="font-size:11px; color:var(--muted); font-weight:normal;">${email}</span>
                                        </div>
                                        <div class="split-btn-group">
                                            <button onclick="event.stopPropagation(); openTaskFeedback('${fbKey}', '${uid}', '${displayName}', '${encodeURIComponent(link)}')" class="split-btn-left">REVIEW</button>
                                            <div class="split-btn-divider"></div>
                                            <a href="${formatUrl(link)}" target="_blank" class="split-btn-left">VIEW SOURCE</a>
                                            <div class="split-btn-divider"></div>
                                            <button data-raw-link="${encodeURIComponent(link)}" onclick="event.stopPropagation(); showRawUrlPrompt(this)" class="split-btn-right" title="View raw URL text">
                                                <span style="font-family: Georgia, serif; font-style: italic; font-weight: 900; font-size: 14px; line-height: 1;">T</span>
                                            </button>
                                        </div>
                                    </div>
                                    ${(fb.rating || noteCount) ? `
                                    <div style="font-size:14px; color:var(--accent); letter-spacing:2px; display:flex; align-items:center; gap:8px; margin-top:4px;">
                                        ${fb.rating ? '★'.repeat(fb.rating) + '☆'.repeat(5 - fb.rating) : ''}
                                        ${noteCount ? `<span class="feedback-badge">${noteCount} comment${noteCount > 1 ? 's' : ''}</span>` : ''}
                                    </div>
                                    ` : ''}
                                </div>`;
                        }
                    });
                    body.innerHTML = count > 0 ? html + '</div>' : '<div style="padding:20px; text-align:center; color:var(--muted);">No submissions yet.</div>';
                }, { onlyOnce: true });
            }, { onlyOnce: true });
        };

        window.showRawUrlPrompt = async (btn) => {
            const raw = decodeURIComponent(btn.getAttribute('data-raw-link'));
            await AppBridge.prompt('Raw Student URL', 'Student submitted URL:', raw, raw);
        };

        var syncData = function() {
            const b = getBridge();
            if (!currentTasks.length) {
                currentTasks = STAGES[currentIdx].defaultTasks.map(t => ({ text: t, date: '' }));
            }
            renderTasks();
            if (!b) return;
            const path = 'user_image_index/ir_v7';
            b.fOnValue(b.fRef(b.firebaseDb, `${path}/tasks/${currentIdx}`), snap => {
                const data = snap.val();
                if (data && Array.isArray(data)) { 
                    currentTasks = data.map(t => typeof t === 'string' ? { text: t, date: '' } : t); 
                    renderTasks(); 
                }
            });
            b.fOnValue(b.fRef(b.firebaseDb, `${path}/broadcast`), snap => {
                const br = snap.val();
                document.getElementById('broadcast-banner').style.display = (currentTool === 'canvas') ? 'none' : (br?.text ? 'flex' : 'none');
                document.getElementById('broadcast-text').innerText = br?.text || '';
            });
            b.fOnValue(b.fRef(b.firebaseDb, `${path}/progress/${currentUser.id}`), snap => { myProgress = snap.val() || {}; renderTasks(); });
            b.fOnValue(b.fRef(b.firebaseDb, `${path}/links/${currentUser.id}`), snap => { myLinks = snap.val() || {}; renderTasks(); });
            b.fOnValue(b.fRef(b.firebaseDb, `${path}/matrix/${currentUser.id}`), snap => { myMatrix = snap.val() || {}; renderMatrix(); });
            if (isAdmin) initHeatmap();
            loadCanvasState();
            loadComments();
            loadNotifications();
            loadTaskFeedback();
        }

        function renderTasks() {
            const list = document.getElementById('m-list'); if (!list) return;
            list.innerHTML = ''; let done = 0;
            currentTasks.forEach((t, i) => {
                const isDone = myProgress[currentIdx]?.[i]; if (isDone) done++;
                const link = myLinks[currentIdx]?.[i];
                const isT = viewMode === 'teacher';
                const fbKey = `${currentIdx}_${i}_${currentUser.id}`;
                const fb = taskFeedback[fbKey] || {};
                const hasTeacherFeedback = fb.rating || (fb.notes && fb.notes.length > 0);
                list.innerHTML += `
                    <div class="item-row ${isDone?'done':''}" onclick="if(!event.target.closest('button') && !event.target.closest('.del-btn') && !event.target.closest('.lit-card') && !event.target.closest('.split-btn-group')) toggleCheck(${i})">
                        <i data-lucide="${isDone?'check-circle':'circle'}" size="22" style="color:${isDone?'var(--success)':'var(--muted)'}"></i>
                        <div style="flex-grow:1;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div style="font-weight:700; font-size:15px; margin-bottom:2px;">${t.text}</div>
                                ${hasTeacherFeedback ? '<span class="feedback-badge">馃摑 FEEDBACK</span>' : ''}
                            </div>
                            ${t.date ? `<span class="task-date">${t.date}</span>` : ''}
                            ${link ? buildLitCard(link, `event.stopPropagation(); openTaskFeedback('${fbKey}', '${currentUser.id}', '${currentUser.name}', '${encodeURIComponent(link)}')`) : ''}
                        </div>
                        <div style="display:flex; gap:12px; align-items:center;">
                            ${isT ? `<i data-lucide="trash-2" class="del-btn" style="opacity:0.6" size="18" onclick="deleteTask(${i})"></i>` : ''}
                            <button class="btn-mini ${link?'btn-accent':''}" onclick="event.stopPropagation(); ${isT ? 'openSubs('+i+',\''+t.text+'\')':'openModal(\'link\',{idx:'+i+'})'}"
                                >
                                <i data-lucide="${isT ? 'users' : (link?'paperclip':'plus')}" size="16"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('percent-text').innerText = `${Math.round((done / (currentTasks.length || 1)) * 100)}%`;
            renderMiniMap();
            if (typeof lucide !== 'undefined') lucide.createIcons();
            applyCanvasSearch();
        }

        function setView(m) {
            viewMode = m; const isT = m === 'teacher';
            document.querySelectorAll('.teacher-only').forEach(el => el.style.display = isT ? 'block' : 'none');
            document.getElementById('btn-t').classList.toggle('active', isT);
            document.getElementById('btn-s').classList.toggle('active', !isT);
            renderTasks();
        }

        function applyTheme(target, save = false) {
            const root = document.documentElement;
            root.setAttribute('data-theme', target);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.setAttribute('data-lucide', target === 'dark' ? 'sun' : 'moon');
            if (save) localStorage.setItem('ir_theme', target);
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        // 宸茶縼绉昏嚦 SDK锛岀Щ闄ゆ湰鍦板啑浣欑洃鍚?        

        function toggleTheme() {
            // 鏍稿績淇锛氬幓 html 鏍囩锛坉ocumentElement锛変笂鑾峰彇灞炴€э紝鑰屼笉鏄?body
            const cur = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(cur === 'dark' ? 'light' : 'dark', true);
        }

        var jump = function(idx) { currentIdx = idx; document.getElementById('h-title').innerText = STAGES[idx].name; document.getElementById('matrix-card').style.display = idx === 2 ? 'block' : 'none'; document.getElementById('milestones-card').style.display = 'block'; renderNav(); syncData(); }
        function renderNav() { const nav = document.getElementById('path-nav'); nav.innerHTML = ''; STAGES.forEach((s, i) => { nav.innerHTML += `<div class="nav-item ${i===currentIdx?'active':''}" onclick="jump(${i})">${s.name}</div>`; }); }

        window.openModal = async (type, data) => {
            const b = getBridge(); if (!b) { await AppBridge.alert("Standby", "Syncing Bridge... One moment."); return; }
            const wrap = document.getElementById('modal-wrap'), body = document.getElementById('modal-body'), sub = document.getElementById('modal-submit');
            wrap.style.display = 'flex'; document.getElementById('modal-title').innerText = type.toUpperCase();
            sub.style.display = 'flex';
            if (type === 'addTask') {
                body.innerHTML = `<div class="field"><label>Task Name</label><input id="m-in" autocomplete="off"></div><div class="field"><label>Due Date</label><input type="date" id="m-date"></div>`;

        // =====================================================================
        //  NOTIFICATIONS SYSTEM
        // =====================================================================
        let notifications = []; // [{id, text, time, read}]

        function pushNotification(nodeId, text, stageFbKey, targetUid) {
            const b = getBridge(); if (!b) return;
            const recipientId = targetUid || currentUser.id;
            const notif = { id: genId(), nodeId, text, time: Date.now(), read: false, stageFbKey };
            
            if (recipientId === currentUser.id) {
                notifications.push(notif);
                b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/notifications/${currentUser.id}`), notifications);
                updateNotifBadge();
                if (currentTool === 'notifs') renderNotifications();
            } else {
                b.fOnValue(b.fRef(b.firebaseDb, `user_image_index/ir_v7/notifications/${recipientId}`), snap => {
                    const recipientNotifs = snap.val() || [];
                    recipientNotifs.push(notif);
                    b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/notifications/${recipientId}`), recipientNotifs);
                }, { onlyOnce: true });
            }
        }

        function loadNotifications() {
            const b = getBridge(); if (!b) return;
            b.fOnValue(b.fRef(b.firebaseDb, `user_image_index/ir_v7/notifications/${currentUser.id}`), snap => {
                notifications = snap.val() || [];
                updateNotifBadge();
                if (currentTool === 'notifs') renderNotifications();
            });
        }

        function updateNotifBadge() {
            const unread = notifications.filter(n => !n.read).length;
            const badge = document.getElementById('notif-count');
            if (unread > 0) {
                badge.style.display = 'inline-block';
                badge.innerText = unread;
            } else {
                badge.style.display = 'none';
            }
            try {
                const latest = notifications.length > 0 ? [...notifications].sort((a, b) => (b.time || 0) - (a.time || 0))[0] : null;
                AppBridge.sendNotification({
                    extensionId: 'ir_navigator',
                    title: 'IR Navigator',
                    body: latest && latest.text ? latest.text : 'No unread notifications',
                    route: 'notification',
                    unreadCount: unread
                });
            } catch (e) { }
        }

        function renderNotifications() {
            const list = document.getElementById('notifs-list');
            if (!list) return;
            if (notifications.length === 0) {
                list.innerHTML = '<div style="padding:40px; text-align:center; color:var(--muted);">No notifications yet. Feedback from your teacher will appear here.</div>';
                return;
            }
            list.innerHTML = '';
            [...notifications].reverse().forEach(n => {
                list.innerHTML += `
                    <div class="notif-card ${n.read ? '' : 'notif-unread'}" onclick="openNotifNode('${n.nodeId || ''}', '${n.id}', '${n.stageFbKey || ''}')">

        async function resetAllData() {
            const b = getBridge(); if (!b) return;
            const ok = await AppBridge.confirm("Reset All Data", "Are you sure you want to clear all student progress, links, matrices, and metadata? This action is permanent.");
            if (!ok) return;
            
            try {
                // Try parent-level deletion first
                await b.fSet(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/meta'), null);
                await b.fSet(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/progress'), null);
                await b.fSet(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/links'), null);
                await b.fSet(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/matrix'), null);
            } catch (err) {
                console.warn("Parent-level deletion restricted, trying individual key deletion:", err);
                try {
                    await new Promise((resolve, reject) => {
                        b.fOnValue(b.fRef(b.firebaseDb, 'user_image_index/ir_v7/meta'), async snap => {
                            const users = snap.val();
                            if (!users) {
                                resolve();
                                return;
                            }
                            const keys = Object.keys(users);
                            try {
                                for (const key of keys) {
                                    await b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/meta/${key}`), null);
                                    await b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/progress/${key}`), null);
                                    await b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/links/${key}`), null);
                                    await b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/matrix/${key}`), null);
                                }
                                resolve();
                            } catch (e) {
                                reject(e);
                            }
                        }, { onlyOnce: true });
                    });
                } catch (fallbackErr) {
                    console.error("Individual key deletion failed:", fallbackErr);
                    await AppBridge.alert("Reset Error", "Could not clear data: " + fallbackErr.message);
                    return;
                }
            }
            
            const seed = await AppBridge.confirm("Seed Test Data", "Would you like to seed 5 mock students for testing/demonstration?");
            if (seed) {
                const ns = ["Alice R.", "Bob S.", "Charlie L.", "Diana I.", "Ethan S."];
                for (let i = 0; i < ns.length; i++) {
                    await b.fSet(b.fRef(b.firebaseDb, `user_image_index/ir_v7/meta/test_${i}`), { name: ns[i], percent: 45, stage: 0 });
                }
                await AppBridge.alert("Success", "Reset complete and mock data seeded.");
            } else {
                await AppBridge.alert("Success", "All classroom data has been cleared.");
            }
        }

        function initUserFromBridge() {
            const b = getBridge();
            if (b && b.currentUser) {
                currentUser = { 
                    id: b.currentUser.id, 
                    email: b.currentUser.email, 
                    name: b.currentUser.name || b.currentUser.email.split('@')[0] 
                };
                document.getElementById('user-status').innerText = currentUser.name.toUpperCase();
                if (b.fUpdate && b.fRef) {
                    b.fUpdate(b.fRef(b.firebaseDb, `user_image_index/ir_v7/meta/${currentUser.id}`), {
                        name: currentUser.name,
                        email: currentUser.email || ''
                    });
                }
                const isMaster = (currentUser.email || "").toLowerCase() === 'moss104088@gmail.com';
                isAdmin = isMaster;
                viewMode = isMaster ? 'teacher' : 'student';
                
                // Show/hide admin controls synchronously
                document.getElementById('admin-controls').style.display = isMaster ? 'flex' : 'none';
                
                // Toggle active state of header buttons
                document.getElementById('btn-t').classList.toggle('active', isMaster);
                document.getElementById('btn-s').classList.toggle('active', !isMaster);
                
                // Apply teacher-only visibility
                document.querySelectorAll('.teacher-only').forEach(el => el.style.display = isMaster ? 'block' : 'none');
                
                syncData();
                return true;
            }
            return false;
        }

        let isSyncInit = false;
        try {
            isSyncInit = initUserFromBridge();
        } catch (e) {
            console.error("Sync bridge init failed:", e);
        }

        if (!isSyncInit) {
            const bridgeInterval = setInterval(() => {
                const b = getBridge();
                if (b && b.firebaseOnAuth) {
                    clearInterval(bridgeInterval);
                    b.firebaseOnAuth(b.firebaseAuth, user => {
                        if (user) {
                            const idPrefix = user.email.toLowerCase().split('@')[0].replace(/\./g, '_');
                            currentUser = { id: idPrefix, email: user.email, name: user.displayName || user.email.split('@')[0] };
                            document.getElementById('user-status').innerText = currentUser.name.toUpperCase();
                            if (b.fUpdate && b.fRef) {
                                b.fUpdate(b.fRef(b.firebaseDb, `user_image_index/ir_v7/meta/${currentUser.id}`), {
                                    name: currentUser.name,
                                    email: currentUser.email || ''
                                });
                            }
                            const isMaster = (currentUser.email || "").toLowerCase() === 'moss104088@gmail.com';
                            isAdmin = isMaster;
                            viewMode = isMaster ? 'teacher' : 'student';
                            document.getElementById('admin-controls').style.display = isMaster ? 'flex' : 'none';
                            document.querySelectorAll('.teacher-only').forEach(el => el.style.display = isMaster ? 'block' : 'none');
                            syncData();
                        }
                    });
                }
            }, 500);
        }

        window.addEventListener('message', (event) => {
            const data = event && event.data ? event.data : null;
            if (!data || data.type !== 'OPEN_NOTIFICATION_VIEW') return;
            switchToTool('notifs');
        });

        window.onload = () => {
            const initTheme = () => {
                if (AppBridge.isDark()) {
                    applyTheme('dark');
                } else {
                    applyTheme('light');
                }
            };

            initTheme();
            setTimeout(initTheme, 150);
            jump(0);
        };
    </script>
</body>
</html>
